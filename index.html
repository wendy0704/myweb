<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <title>周思妤｜個人數位名片</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #f5f5f7;
      --card-bg: #ffffff;
      --primary: #111827;
      --secondary: #6b7280;
      --accent: #0ea5e9;
      --accent-soft: rgba(14, 165, 233, 0.08);
      --border: #e5e7eb;
      --radius-lg: 18px;
      --radius-full: 999px;
      --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.12);
      --transition-fast: 160ms ease-out;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #e0f2fe, #f5f5f7 42%, #f9fafb 100%);
      color: var(--primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: var(--card-bg);
      border-radius: 28px;
      box-shadow: var(--shadow-soft);
      padding: 32px 28px 28px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      border: 1px solid rgba(148, 163, 184, 0.15);
      backdrop-filter: blur(18px);
    }

    @media (min-width: 768px) {
      .card {
        padding: 40px 40px 32px;
        border-radius: 32px;
      }
    }

    .top-section {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    @media (max-width: 640px) {
      .top-section {
        flex-direction: column;
        text-align: center;
      }
    }

    .avatar-wrapper {
      position: relative;
      width: 132px;
      height: 132px;
      border-radius: 32px;
      padding: 10px;
      background: conic-gradient(from 180deg,
          rgba(59, 130, 246, 0.12),
          rgba(56, 189, 248, 0.12),
          rgba(96, 165, 250, 0.18),
          rgba(56, 189, 248, 0.12));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 24px;
      overflow: hidden;
      background: #111827;
      border: 1px solid rgba(148, 163, 184, 0.5);
      position: relative;
    }

    .avatar-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .avatar-badge {
      position: absolute;
      bottom: 8px;
      right: 10px;
      background: rgba(2, 6, 23, 0.92);
      color: #e5e7eb;
      font-size: 11px;
      padding: 4px 9px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      backdrop-filter: blur(14px);
    }

    .avatar-badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.25);
    }

    .info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .name {
      font-size: 28px;
      letter-spacing: 0.03em;
      font-weight: 600;
    }

    .subtitle {
      font-size: 14px;
      color: var(--secondary);
      line-height: 1.5;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .pill {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.55);
      color: #4b5563;
      background: rgba(248, 250, 252, 0.9);
    }

    .divider {
      height: 1px;
      background: linear-gradient(to right,
          transparent,
          rgba(148, 163, 184, 0.4),
          transparent);
    }

    .middle-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #9ca3af;
      font-weight: 500;
    }

    .section-title.zh {
      text-transform: none;
      letter-spacing: 0.08em;
    }

    .volleyball-row {
      display: flex;
      justify-content: center;
      gap: 32px;
    }

    @media (max-width: 480px) {
      .volleyball-row {
        gap: 20px;
      }
    }

    .volleyball {
      position: relative;
      width: 72px;
      height: 72px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #e5f4ff, #bfdbfe);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.22);
      overflow: visible;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast),
        background 200ms ease-out;
    }

    .volleyball:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.28);
      background: radial-gradient(circle at 30% 20%, #eff6ff, #bfdbfe);
    }

    .volleyball-icon {
      font-size: 30px;
      filter: drop-shadow(0 3px 4px rgba(15, 23, 42, 0.35));
    }
    .volleyball-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: inherit;
      border-radius: 999px;
      outline: none;
    }
    .volleyball-link:focus-visible .volleyball {
      box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.25), 0 12px 28px rgba(15, 23, 42, 0.22);
    }

    .social-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 92px;
    }

    .social-label {
      font-size: 12px;
      color: #6b7280;
      letter-spacing: 0.06em;
      user-select: none;
    }

    .surprise-ball {
      position: fixed;
      right: 22px;
      bottom: 22px;
      width: 66px;
      height: 66px;
      border-radius: 999px;
      background: transparent;
      border: none;
      box-shadow: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      user-select: none;
      touch-action: none;
      z-index: 50;
    }

    .surprise-ball:active {
      cursor: grabbing;
    }

    .surprise-ball-inner {
      font-size: 42px;
      filter: drop-shadow(0 3px 4px rgba(15, 23, 42, 0.35));
      transform: translateY(-1px);
    }

    .surprise-hint {
      position: fixed;
      right: 20px;
      bottom: 94px;
      font-size: 11px;
      color: rgba(107, 114, 128, 0.9);
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(148, 163, 184, 0.5);
      border-radius: 999px;
      padding: 6px 10px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
      backdrop-filter: blur(10px);
      user-select: none;
      z-index: 49;
    }

    .bottom-section {
      border-radius: 16px;
      padding: 14px 14px 12px;
      background: radial-gradient(circle at top right, var(--accent-soft), #f9fafb);
      border: 1px solid rgba(148, 163, 184, 0.45);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .player-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .player-title {
      font-size: 13px;
      font-weight: 500;
      color: #374151;
    }

    .player-subtitle {
      font-size: 11px;
      color: #9ca3af;
    }

    .player-chip {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(59, 130, 246, 0.45);
      color: #1d4ed8;
      background: rgba(219, 234, 254, 0.9);
    }

    .player-controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .yt-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    @media (max-width: 640px) {
      .yt-grid {
        grid-template-columns: 1fr;
      }
    }

    .yt-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-decoration: none;
      color: inherit;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.55);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
    }

    .yt-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.12);
    }

    .yt-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #020617;
      overflow: hidden;
    }

    .yt-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .yt-badge {
      position: absolute;
      right: 10px;
      bottom: 10px;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(2, 6, 23, 0.82);
      color: #f9fafb;
      border: 1px solid rgba(148, 163, 184, 0.45);
      backdrop-filter: blur(10px);
    }

    .yt-meta {
      padding: 10px 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .yt-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
      line-height: 1.35;
      display: -webkit-box;
      line-clamp: 2;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .yt-sub {
      font-size: 11px;
      color: #6b7280;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .url-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .url-input {
      flex: 1;
      min-width: 0;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.85);
      font-size: 12px;
      outline: none;
      background: rgba(249, 250, 251, 0.9);
      color: #111827;
    }

    .url-input::placeholder {
      color: #9ca3af;
    }

    .url-button {
      padding: 7px 13px;
      border-radius: 999px;
      border: none;
      font-size: 12px;
      background: #111827;
      color: #f9fafb;
      cursor: pointer;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.5);
      transition: transform var(--transition-fast), box-shadow var(--transition-fast),
        background 140ms ease-out;
    }

    .url-button:hover {
      transform: translateY(-1px);
      background: #020617;
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.7);
    }

    .url-button:active {
      transform: translateY(0);
      box-shadow: 0 6px 12px rgba(15, 23, 42, 0.55);
    }

    .player-embed {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.6);
      background: #020617;
      aspect-ratio: 16 / 9;
    }

    .player-embed iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .player-hint {
      font-size: 10px;
      color: #9ca3af;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .player-hint span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #22c55e;
    }
  </style>
</head>

  <div id="surprise-hint" class="surprise-hint">點住🏐拖曳，甩動方向後放開就能丟出去</div>
  <div id="surprise-ball" class="surprise-ball" aria-label="可丟擲的排球">
    <div class="surprise-ball-inner">🏐</div>
  </div>

  <script>
    // 1) 小驚喜：點住可丟擲排球（反彈、最後停下）
    (function surpriseBallPhysics() {
      const ball = document.getElementById("surprise-ball");
      const hint = document.getElementById("surprise-hint");
      if (!ball) return;

      const state = {
        x: 0,
        y: 0,
        vx: 0,
        vy: 0,
        radius: 33,
        isHolding: false,
        pointerId: null,
        lastMoves: [],
        rafId: null,
        animating: false,
      };

      const config = {
        restitution: 0.72,
        friction: 0.988,
        stopSpeed: 22,
        maxSpeed: 2200,
      };

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function now() {
        return performance.now();
      }

      function setBallPosition(x, y) {
        state.x = x;
        state.y = y;
        ball.style.transform = `translate3d(${x}px, ${y}px, 0)`;
      }

      function viewportBounds() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        return {
          minX: 0,
          minY: 0,
          maxX: w - state.radius * 2,
          maxY: h - state.radius * 2,
        };
      }

      function resetToCorner() {
        const bounds = viewportBounds();
        const x = bounds.maxX - 22;
        const y = bounds.maxY - 22;
        setBallPosition(clamp(x, bounds.minX, bounds.maxX), clamp(y, bounds.minY, bounds.maxY));
      }

      function pushMoveSample(clientX, clientY) {
        const t = now();
        state.lastMoves.push({ x: clientX, y: clientY, t });
        while (state.lastMoves.length > 8) state.lastMoves.shift();
        const cutoff = t - 120;
        while (state.lastMoves.length > 2 && state.lastMoves[0].t < cutoff) state.lastMoves.shift();
      }

      function estimateVelocity() {
        if (state.lastMoves.length < 2) return { vx: 0, vy: 0 };
        const a = state.lastMoves[0];
        const b = state.lastMoves[state.lastMoves.length - 1];
        const dt = (b.t - a.t) / 1000;
        if (dt <= 0) return { vx: 0, vy: 0 };
        let vx = (b.x - a.x) / dt;
        let vy = (b.y - a.y) / dt;
        const speed = Math.hypot(vx, vy);
        if (speed > config.maxSpeed) {
          const s = config.maxSpeed / speed;
          vx *= s;
          vy *= s;
        }
        return { vx, vy };
      }

      function stopAnimation() {
        state.animating = false;
        if (state.rafId) cancelAnimationFrame(state.rafId);
        state.rafId = null;
      }

      function tick() {
        if (!state.animating || state.isHolding) return;

        const dt = 1 / 60;
        const bounds = viewportBounds();

        let x = state.x + state.vx * dt;
        let y = state.y + state.vy * dt;

        if (x <= bounds.minX) {
          x = bounds.minX;
          state.vx = -state.vx * config.restitution;
        } else if (x >= bounds.maxX) {
          x = bounds.maxX;
          state.vx = -state.vx * config.restitution;
        }

        if (y <= bounds.minY) {
          y = bounds.minY;
          state.vy = -state.vy * config.restitution;
        } else if (y >= bounds.maxY) {
          y = bounds.maxY;
          state.vy = -state.vy * config.restitution;
        }

        state.vx *= config.friction;
        state.vy *= config.friction;

        setBallPosition(x, y);

        const speed = Math.hypot(state.vx, state.vy);
        if (speed < config.stopSpeed) {
          state.vx = 0;
          state.vy = 0;
          stopAnimation();
          return;
        }

        state.rafId = requestAnimationFrame(tick);
      }

      function startThrow(vx, vy) {
        state.vx = vx;
        state.vy = vy;
        state.animating = true;
        stopAnimation();
        state.animating = true;
        state.rafId = requestAnimationFrame(tick);
      }

      function getOffsetWithinBall(clientX, clientY) {
        const rect = ball.getBoundingClientRect();
        return {
          ox: clientX - rect.left,
          oy: clientY - rect.top,
        };
      }

      let holdOffset = { ox: state.radius, oy: state.radius };

      function onPointerDown(e) {
        if (state.isHolding) return;
        state.pointerId = e.pointerId;
        ball.setPointerCapture?.(e.pointerId);

        if (hint) {
          hint.style.opacity = "0";
          hint.style.transition = "opacity 220ms ease-out";
        }

        state.lastMoves = [];
        pushMoveSample(e.clientX, e.clientY);
        holdOffset = getOffsetWithinBall(e.clientX, e.clientY);

        // 點到就抓取（不需要長按）
        state.isHolding = true;
        state.vx = 0;
        state.vy = 0;
        stopAnimation();
      }

      function onPointerMove(e) {
        if (state.pointerId !== e.pointerId) return;
        pushMoveSample(e.clientX, e.clientY);
        if (!state.isHolding) return;

        const bounds = viewportBounds();
        const newX = clamp(e.clientX - holdOffset.ox, bounds.minX, bounds.maxX);
        const newY = clamp(e.clientY - holdOffset.oy, bounds.minY, bounds.maxY);
        setBallPosition(newX, newY);
      }

      function onPointerUp(e) {
        if (state.pointerId !== e.pointerId) return;

        const wasHolding = state.isHolding;
        state.isHolding = false;
        state.pointerId = null;

        if (!wasHolding) return;

        const { vx, vy } = estimateVelocity();
        startThrow(vx, vy);
      }

      function onPointerCancel(e) {
        if (state.pointerId !== e.pointerId) return;
        state.isHolding = false;
        state.pointerId = null;
      }

      window.addEventListener("resize", () => {
        const bounds = viewportBounds();
        setBallPosition(clamp(state.x, bounds.minX, bounds.maxX), clamp(state.y, bounds.minY, bounds.maxY));
      });

      ball.addEventListener("pointerdown", onPointerDown);
      window.addEventListener("pointermove", onPointerMove, { passive: true });
      window.addEventListener("pointerup", onPointerUp, { passive: true });
      window.addEventListener("pointercancel", onPointerCancel, { passive: true });

      // 初始化位置：右下角（但用 translate 定位，避免與 fixed top/left 衝突）
      ball.style.left = "0";
      ball.style.top = "0";
      ball.style.transform = "translate3d(0,0,0)";
      resetToCorner();
    })();

    // 2) 今日音樂推薦：後台預設 3 個 YouTube 連結，顯示縮圖與標題
    (function youtubeRecoCards() {
      const YOUTUBE_URLS = [
        "https://youtu.be/HEAn4FqXFY4?si=Chkj0wX-FiN2ap79",
        "https://youtu.be/QyvREl7epGY?si=uoWBQxrf7xy4kYB6",
        "https://youtu.be/1Lmy7qwmSMc?si=Bvg7MAXWzgKdCiLI",
      ];

      function normalizeYoutubeUrl(raw) {
        const value = (raw || "").trim();
        if (!value) return null;
        let url;
        try {
          url = new URL(value);
        } catch {
          return null;
        }
        const host = url.hostname.replace(/^www\./, "");
        const isYoutube = host === "youtube.com" || host.endsWith(".youtube.com") || host === "youtu.be";
        if (!isYoutube) return null;
        return url.toString();
      }

      async function fetchOEmbed(youtubeUrl) {
        const endpoint = new URL("https://www.youtube.com/oembed");
        endpoint.searchParams.set("url", youtubeUrl);
        endpoint.searchParams.set("format", "json");
        const res = await fetch(endpoint.toString(), { mode: "cors" });
        if (!res.ok) throw new Error("oEmbed failed");
        return await res.json();
      }

      function createCard({ href, title, thumb }) {
        const a = document.createElement("a");
        a.className = "yt-card";
        a.href = href;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.ariaLabel = title ? `前往 YouTube：${title}` : "前往 YouTube";

        const thumbWrap = document.createElement("div");
        thumbWrap.className = "yt-thumb";

        const img = document.createElement("img");
        img.loading = "lazy";
        img.alt = title || "YouTube 縮圖";
        if (thumb) img.src = thumb;
        thumbWrap.appendChild(img);

        const badge = document.createElement("div");
        badge.className = "yt-badge";
        badge.textContent = "YouTube";
        thumbWrap.appendChild(badge);

        const meta = document.createElement("div");
        meta.className = "yt-meta";

        const t = document.createElement("div");
        t.className = "yt-title";
        t.textContent = title || "（載入標題中…）";

        const sub = document.createElement("div");
        sub.className = "yt-sub";

        const left = document.createElement("span");
        left.textContent = "點擊前往";

        const right = document.createElement("span");
        right.textContent = "↗";
        right.style.color = "#0ea5e9";

        sub.appendChild(left);
        sub.appendChild(right);

        meta.appendChild(t);
        meta.appendChild(sub);

        a.appendChild(thumbWrap);
        a.appendChild(meta);
        return { el: a, titleEl: t, imgEl: img };
      }

      window.addEventListener("DOMContentLoaded", async () => {
        const grid = document.getElementById("yt-reco-grid");
        if (!grid) return;

        const links = YOUTUBE_URLS.map(normalizeYoutubeUrl).filter(Boolean).slice(0, 3);
        if (links.length === 0) return;

        const cards = links.map((href) => {
          const card = createCard({ href, title: "", thumb: "" });
          grid.appendChild(card.el);
          return { href, ...card };
        });

        await Promise.all(cards.map(async (c) => {
          try {
            const data = await fetchOEmbed(c.href);
            if (data?.title) c.titleEl.textContent = data.title;
            if (data?.thumbnail_url) c.imgEl.src = data.thumbnail_url;
            if (data?.title) c.imgEl.alt = data.title;
          } catch {
            c.titleEl.textContent = "YouTube 連結";
            c.imgEl.alt = "YouTube 縮圖";
          }
        }));
      });
    })();
  </script>
</body>
